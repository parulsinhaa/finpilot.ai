<svg width="240" height="56" viewBox="0 0 240 56" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF6B9D"/>
      <stop offset="100%" stop-color="#A78BFA"/>
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#FF6B9D" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#A78BFA"/>
    </linearGradient>
  </defs>

  <!-- Icon: rising bars + upward arrow -->
  <!-- Bar 1 -->
  <rect x="4" y="34" width="9" height="18" rx="3" fill="url(#grad2)"/>
  <!-- Bar 2 -->
  <rect x="17" y="25" width="9" height="27" rx="3" fill="url(#grad2)" opacity="0.8"/>
  <!-- Bar 3 -->
  <rect x="30" y="14" width="9" height="38" rx="3" fill="url(#grad1)"/>

  <!-- Arrow line -->
  <line x1="8" y1="38" x2="54" y2="6" stroke="url(#grad1)" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Arrow head -->
  <polyline points="44,4 54,6 52,16" stroke="url(#grad1)" stroke-width="2.5"
            fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Wordmark: FinPilot -->
  <text x="68" y="36"
        font-family="'Bricolage Grotesque', 'Georgia', serif"
        font-weight="700"
        font-size="26"
        letter-spacing="-0.8"
        fill="url(#grad1)">FinPilot</text>

  <!-- Wordmark: AI -->
  <text x="196" y="36"
        font-family="'DM Sans', 'Helvetica', sans-serif"
        font-weight="300"
        font-size="22"
        font-style="italic"
        fill="#A78BFA"
        opacity="0.9"> AI</text>

  <!-- Tagline dot -->
  <circle cx="68" cy="46" r="2" fill="#FF6B9D" opacity="0.6"/>
  <text x="74" y="49"
        font-family="'DM Sans', 'Helvetica', sans-serif"
        font-weight="400"
        font-size="9"
        letter-spacing="1.5"
        fill="#8888aa">YOUR FINANCIAL CO-PILOT</text>
</svg>